name: destiminder
description: "Vibrate when you reach your destination"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0-0 <4.0.0'
  flutter: '>=3.42.0-0'

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.2.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  flutter_map_animations: ^0.6.0
  vibration: ^3.1.2
  permission_handler: ^11.4.0
  provider: ^6.1.2
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1
  flutter_background_service_ios: ^5.0.3
  shared_preferences: ^2.5.4
  flutter_staggered_animations: ^1.1.0
  sliding_up_panel: ^2.0.0+1
  flutter_swipe_action_cell: ^3.1.3
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^17.2.4
  wakelock_plus: ^1.4.0
  uuid: ^4.5.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2196F3"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/